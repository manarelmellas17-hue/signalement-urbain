<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Administration — Signalement Urbain</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-tabs { display:flex; gap:0.5rem; margin:1.5rem 0 1rem; }
    .tab-btn { padding:0.5rem 1.2rem; border:2px solid #1a73e8; border-radius:6px;
               background:#fff; color:#1a73e8; cursor:pointer; font-weight:600; transition:.2s; }
    .tab-btn.active { background:#1a73e8; color:#fff; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    table { width:100%; border-collapse:collapse; font-size:0.9rem; }
    th { background:#f1f3f4; padding:0.7rem 1rem; text-align:left; font-weight:600; }
    td { padding:0.65rem 1rem; border-bottom:1px solid #eee; vertical-align:middle; }
    tr:hover td { background:#f9f9f9; }
    .badge-actif    { background:#e6f4ea; color:#1e8e3e; padding:2px 10px; border-radius:12px; font-size:.8rem; }
    .badge-suspendu { background:#fce8e6; color:#d93025; padding:2px 10px; border-radius:12px; font-size:.8rem; }
    .badge-role     { background:#e8f0fe; color:#1a73e8; padding:2px 10px; border-radius:12px; font-size:.8rem; }
    .actions { display:flex; gap:0.4rem; flex-wrap:wrap; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
                     z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:12px; padding:2rem; width:460px; max-width:94%; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .search-bar { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1rem; align-items:center; }
    .search-bar input { flex:1; min-width:180px; }
    #confirm-modal .modal-box { max-width:380px; text-align:center; }
    #confirm-modal .modal-box p { margin:0.8rem 0 1.5rem; color:#555; }
    .stat-mini { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin:1.5rem 0; }
    .stat-mini .card { text-align:center; padding:1rem; }
    .stat-mini .num { font-size:1.8rem; font-weight:700; }
  </style>
</head>
<body>
<nav>
  <h1>🏙️ Signalement Urbain</h1>
  <div>
    <span id="nav-user"></span>
    <a href="dashboard.html">Dashboard</a>
    <a href="index.html">Carte</a>
    <a href="#" id="nav-logout" onclick="logout()">Déconnexion</a>
  </div>
</nav>

<div class="container">
  <h2 style="margin-top:1.5rem">⚙️ Administration des comptes</h2>

  <!-- Stats mini -->
  <div class="stat-mini" id="stat-mini"></div>

  <!-- Tabs -->
  <div class="admin-tabs">
    <button class="tab-btn active" onclick="switchTab('liste')">👥 Utilisateurs</button>
    <button class="tab-btn" onclick="switchTab('ajouter')">➕ Ajouter un compte</button>
  </div>

  <!-- TAB: Liste -->
  <div class="tab-content active" id="tab-liste">
    <div class="card">
      <div class="search-bar">
        <input type="text" id="search" placeholder="🔍 Rechercher par nom ou email…" oninput="filtrerUtilisateurs()">
        <select id="filtre-role" onchange="filtrerUtilisateurs()">
          <option value="">Tous les rôles</option>
          <option value="citoyen">Citoyen</option>
          <option value="agent">Agent</option>
          <option value="administrateur">Administrateur</option>
        </select>
        <select id="filtre-statut" onchange="filtrerUtilisateurs()">
          <option value="">Tous les statuts</option>
          <option value="actif">Actif</option>
          <option value="suspendu">Suspendu</option>
        </select>
      </div>
      <div id="table-container">Chargement…</div>
    </div>
  </div>

  <!-- TAB: Ajouter -->
  <div class="tab-content" id="tab-ajouter">
    <div class="card" style="max-width:520px">
      <h3 style="margin-bottom:1.2rem">Créer un nouveau compte</h3>
      <div id="alert-add"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Nom complet</label>
          <input type="text" id="add-nom" placeholder="Ex: Ahmed Benali">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="add-email" placeholder="exemple@mail.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="add-password" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Rôle</label>
          <select id="add-role">
            <option value="citoyen">Citoyen</option>
            <option value="agent">Agent</option>
            <option value="administrateur">Administrateur</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="ajouterUtilisateur()">➕ Créer le compte</button>
    </div>
  </div>
</div>

<!-- Modal Modifier -->
<div class="modal-overlay" id="modal-modifier">
  <div class="modal-box">
    <h3 style="margin-bottom:1.2rem">✏️ Modifier le compte</h3>
    <input type="hidden" id="edit-id">
    <div class="form-row">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="edit-nom">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="edit-email">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Rôle</label>
        <select id="edit-role">
          <option value="citoyen">Citoyen</option>
          <option value="agent">Agent</option>
          <option value="administrateur">Administrateur</option>
        </select>
      </div>
      <div class="form-group">
        <label>Statut</label>
        <select id="edit-statut">
          <option value="actif">Actif</option>
          <option value="suspendu">Suspendu</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Nouveau mot de passe <small style="color:#999">(laisser vide = inchangé)</small></label>
      <input type="password" id="edit-password" placeholder="••••••••">
    </div>
    <div style="display:flex;gap:1rem;margin-top:1rem">
      <button class="btn btn-success" onclick="sauvegarderModification()">💾 Sauvegarder</button>
      <button class="btn btn-danger"  onclick="fermerModal('modal-modifier')">✖ Annuler</button>
    </div>
  </div>
</div>

<!-- Modal Confirmation Suppression -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <div style="font-size:2.5rem">🗑️</div>
    <h3>Supprimer ce compte ?</h3>
    <p id="confirm-text">Cette action est irréversible.</p>
    <input type="hidden" id="confirm-id">
    <div style="display:flex;gap:1rem;justify-content:center">
      <button class="btn btn-danger"   onclick="confirmerSuppression()">Supprimer</button>
      <button class="btn btn-primary"  onclick="fermerModal('confirm-modal')">Annuler</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
requireLogin();
updateNav();

// Vérifier que l'utilisateur connecté est admin
const moi = getUser();
if (!moi || moi.role !== 'administrateur') {
  alert('Accès réservé aux administrateurs.');
  window.location.href = 'index.html';
}

let tousUtilisateurs = [];

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['liste','ajouter'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ── Chargement ────────────────────────────────────────────────────────────────
async function charger() {
  const res  = await fetch(`${API}/users`);
  const data = await res.json();
  tousUtilisateurs = Array.isArray(data) ? data : [];
  afficherStats();
  filtrerUtilisateurs();
}

function afficherStats() {
  const total   = tousUtilisateurs.length;
  const actifs  = tousUtilisateurs.filter(u => u.statut !== 'suspendu').length;
  const admins  = tousUtilisateurs.filter(u => u.role === 'administrateur').length;
  const agents  = tousUtilisateurs.filter(u => u.role === 'agent').length;
  document.getElementById('stat-mini').innerHTML = `
    <div class="card"><div class="num" style="color:#1a73e8">${total}</div><div style="color:#666">Total</div></div>
    <div class="card"><div class="num" style="color:#1e8e3e">${actifs}</div><div style="color:#666">Actifs</div></div>
    <div class="card"><div class="num" style="color:#e37400">${agents}</div><div style="color:#666">Agents</div></div>
    <div class="card"><div class="num" style="color:#9334e6">${admins}</div><div style="color:#666">Admins</div></div>
  `;
}

function filtrerUtilisateurs() {
  const q       = document.getElementById('search').value.toLowerCase();
  const role    = document.getElementById('filtre-role').value;
  const statut  = document.getElementById('filtre-statut').value;
  let liste = tousUtilisateurs;
  if (q)      liste = liste.filter(u => u.nom?.toLowerCase().includes(q) || u.email?.toLowerCase().includes(q));
  if (role)   liste = liste.filter(u => u.role === role);
  if (statut) liste = liste.filter(u => (u.statut || 'actif') === statut);
  afficherTable(liste);
}

function afficherTable(liste) {
  const container = document.getElementById('table-container');
  if (!liste.length) {
    container.innerHTML = '<p style="color:#666;padding:1rem">Aucun utilisateur trouvé.</p>';
    return;
  }
  container.innerHTML = `
    <table>
      <thead><tr>
        <th>Nom</th><th>Email</th><th>Rôle</th><th>Statut</th>
        <th>Inscrit le</th><th>Actions</th>
      </tr></thead>
      <tbody>
        ${liste.map(u => `
          <tr>
            <td><strong>${u.nom || '—'}</strong></td>
            <td>${u.email || '—'}</td>
            <td><span class="badge-role">${u.role || 'citoyen'}</span></td>
            <td><span class="badge-${u.statut === 'suspendu' ? 'suspendu' : 'actif'}">${u.statut === 'suspendu' ? 'Suspendu' : 'Actif'}</span></td>
            <td>${u.date_inscription ? new Date(u.date_inscription).toLocaleDateString() : '—'}</td>
            <td>
              <div class="actions">
                <button class="btn btn-primary" style="padding:.3rem .8rem;font-size:.8rem"
                  onclick="ouvrirModifier('${u._id}')">✏️ Modifier</button>
                ${u.statut === 'suspendu'
                  ? `<button class="btn btn-success" style="padding:.3rem .8rem;font-size:.8rem"
                       onclick="toggleStatut('${u._id}','actif')">✅ Réactiver</button>`
                  : `<button class="btn" style="padding:.3rem .8rem;font-size:.8rem;background:#f9a825;color:#fff"
                       onclick="toggleStatut('${u._id}','suspendu')">⛔ Suspendre</button>`
                }
                <button class="btn btn-danger" style="padding:.3rem .8rem;font-size:.8rem"
                  onclick="demanderSuppression('${u._id}','${(u.nom||'').replace(/'/g,"\\'")}')">🗑️</button>
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ── Modifier ──────────────────────────────────────────────────────────────────
function ouvrirModifier(id) {
  const u = tousUtilisateurs.find(x => x._id === id);
  if (!u) return;
  document.getElementById('edit-id').value       = id;
  document.getElementById('edit-nom').value      = u.nom || '';
  document.getElementById('edit-email').value    = u.email || '';
  document.getElementById('edit-role').value     = u.role || 'citoyen';
  document.getElementById('edit-statut').value   = u.statut || 'actif';
  document.getElementById('edit-password').value = '';
  document.getElementById('modal-modifier').classList.add('open');
}

async function sauvegarderModification() {
  const id       = document.getElementById('edit-id').value;
  const nom      = document.getElementById('edit-nom').value;
  const email    = document.getElementById('edit-email').value;
  const role     = document.getElementById('edit-role').value;
  const statut   = document.getElementById('edit-statut').value;
  const password = document.getElementById('edit-password').value;

  const body = { nom, email, role, statut };
  if (password) body.motdepasse = password;

  const res  = await fetch(`${API}/users/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.success) {
    fermerModal('modal-modifier');
    charger();
  } else {
    alert('Erreur : ' + data.error);
  }
}

// ── Toggle statut rapide ──────────────────────────────────────────────────────
async function toggleStatut(id, nouveauStatut) {
  const res  = await fetch(`${API}/users/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ statut: nouveauStatut })
  });
  const data = await res.json();
  if (data.success) charger();
  else alert('Erreur : ' + data.error);
}

// ── Suppression ───────────────────────────────────────────────────────────────
function demanderSuppression(id, nom) {
  document.getElementById('confirm-id').value   = id;
  document.getElementById('confirm-text').textContent =
    `Supprimer le compte de « ${nom} » ? Cette action est irréversible.`;
  document.getElementById('confirm-modal').classList.add('open');
}

async function confirmerSuppression() {
  const id  = document.getElementById('confirm-id').value;
  const res = await fetch(`${API}/users/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) {
    fermerModal('confirm-modal');
    charger();
  } else {
    alert('Erreur : ' + data.error);
  }
}

// ── Ajouter ───────────────────────────────────────────────────────────────────
async function ajouterUtilisateur() {
  const nom      = document.getElementById('add-nom').value.trim();
  const email    = document.getElementById('add-email').value.trim();
  const password = document.getElementById('add-password').value;
  const role     = document.getElementById('add-role').value;
  const alertDiv = document.getElementById('alert-add');

  if (!nom || !email || !password) {
    alertDiv.innerHTML = '<div class="alert alert-error">Tous les champs sont obligatoires.</div>';
    return;
  }

  const res  = await fetch(`${API}/users/register`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nom, email, motdepasse: password, role })
  });
  const data = await res.json();
  if (data.success) {
    alertDiv.innerHTML = '<div class="alert alert-success">✅ Compte créé avec succès !</div>';
    document.getElementById('add-nom').value = '';
    document.getElementById('add-email').value = '';
    document.getElementById('add-password').value = '';
    charger();
    setTimeout(() => switchTab('liste'), 1200);
  } else {
    alertDiv.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function fermerModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Fermer modal en cliquant en dehors
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

charger();
</script>
</body>
</html>
