<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription — Signalement Urbain</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <h1>🏙️ Signalement Urbain</h1>
  <div><a href="index.html">Accueil</a></div>
</nav>

<div class="container" style="max-width:480px">
  <div class="card" style="margin-top:3rem">
    <h2 style="margin-bottom:1.5rem">Inscription</h2>
    <div id="alert"></div>

    <div class="form-group">
      <label>Nom complet</label>
      <input type="text" id="nom" placeholder="Votre nom">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="votre@email.com">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label>Rôle</label>
      <select id="role">
        <option value="citoyen">Citoyen</option>
        <option value="agent">Agent Municipal</option>
        <option value="administrateur">Administrateur</option>
      </select>
    </div>

    <button class="btn btn-primary" onclick="register()" style="width:100%">
      S'inscrire
    </button>
    <p style="margin-top:1rem;text-align:center">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </p>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
async function register() {
  const nom      = document.getElementById('nom').value;
  const email    = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const role     = document.getElementById('role').value;
  const alertDiv = document.getElementById('alert');

  if (!nom || !email || !password) {
    alertDiv.innerHTML = `<div class="alert alert-error">Tous les champs sont obligatoires</div>`;
    return;
  }

  const res = await fetch(`${API}/users/register`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nom, email, motdepasse: password, role })
  });

  const data = await res.json();
  if (data.success) {
    alertDiv.innerHTML = `<div class="alert alert-success">Compte créé ! Redirection...</div>`;
    setTimeout(() => window.location.href = 'login.html', 1500);
  } else {
    alertDiv.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
  }
}
</script>
</body>
</html>
