<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard — Signalement Urbain</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <h1>🏙️ Signalement Urbain</h1>
  <div>
    <span id="nav-user"></span>
    <a href="index.html">Carte</a>
    <a href="#" id="nav-logout" onclick="logout()">Déconnexion</a>
  </div>
</nav>

<div class="container">

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin:2rem 0">
    <div class="card" style="text-align:center;border-top:4px solid #1a73e8">
      <div style="font-size:2rem;font-weight:700" id="stat-total">0</div>
      <div style="color:#666">Total</div>
    </div>
    <div class="card" style="text-align:center;border-top:4px solid #f9a825">
      <div style="font-size:2rem;font-weight:700" id="stat-attente">0</div>
      <div style="color:#666">En attente</div>
    </div>
    <div class="card" style="text-align:center;border-top:4px solid #1e88e5">
      <div style="font-size:2rem;font-weight:700" id="stat-cours">0</div>
      <div style="color:#666">En cours</div>
    </div>
    <div class="card" style="text-align:center;border-top:4px solid #43a047">
      <div style="font-size:2rem;font-weight:700" id="stat-resolu">0</div>
      <div style="color:#666">Résolus</div>
    </div>
  </div>

  <!-- Filtres -->
  <div class="card">
    <div style="display:flex;gap:1rem;flex-wrap:wrap">
      <select id="filtre-statut" onchange="filtrer()">
        <option value="">Tous les statuts</option>
        <option value="en_attente">En attente</option>
        <option value="en_cours">En cours</option>
        <option value="resolu">Résolu</option>
        <option value="rejete">Rejeté</option>
      </select>
      <select id="filtre-categorie" onchange="filtrer()">
        <option value="">Toutes les catégories</option>
        <option value="eclairage">💡 Éclairage</option>
        <option value="route">🛣️ Route</option>
        <option value="dechets">🗑️ Déchets</option>
        <option value="vandalisme">🔨 Vandalisme</option>
        <option value="inondation">🌊 Inondation</option>
        <option value="autre">📌 Autre</option>
      </select>
    </div>
  </div>

  <!-- Liste -->
  <div id="liste-dashboard">Chargement...</div>
</div>

<!-- Modal traitement -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
  <div class="card" style="width:500px;max-width:90%">
    <h3 style="margin-bottom:1rem">✏️ Traiter le signalement</h3>
    <input type="hidden" id="modal-id">
    <input type="hidden" id="modal-rev">
    <div class="form-group">
      <label>Nouveau statut</label>
      <select id="modal-statut">
        <option value="en_attente">En attente</option>
        <option value="en_cours">En cours</option>
        <option value="resolu">Résolu</option>
        <option value="rejete">Rejeté</option>
      </select>
    </div>
    <div class="form-group">
      <label>Commentaire</label>
      <textarea id="modal-commentaire" rows="3" 
        placeholder="Ajouter un commentaire..."></textarea>
    </div>
    <div style="display:flex;gap:1rem">
      <button class="btn btn-success" onclick="sauvegarder()">💾 Sauvegarder</button>
      <button class="btn btn-danger" onclick="fermerModal()">✖ Annuler</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
requireLogin();
updateNav();

let tousSignalements = [];

const categories = {
  eclairage:  '💡 Éclairage',
  route:      '🛣️ Route',
  dechets:    '🗑️ Déchets',
  vandalisme: '🔨 Vandalisme',
  inondation: '🌊 Inondation',
  autre:      '📌 Autre'
};

async function charger() {
  const res = await fetch(`${API}/signalements`);
  const all = await res.json();
  tousSignalements = all.filter(s => s.type === 'signalement');
  mettreAJourStats();
  afficher(tousSignalements);
}

function mettreAJourStats() {
  document.getElementById('stat-total').textContent   = tousSignalements.length;
  document.getElementById('stat-attente').textContent = tousSignalements.filter(s => s.statut === 'en_attente').length;
  document.getElementById('stat-cours').textContent   = tousSignalements.filter(s => s.statut === 'en_cours').length;
  document.getElementById('stat-resolu').textContent  = tousSignalements.filter(s => s.statut === 'resolu').length;
}

function getBadge(statut) {
  const map = {
    en_attente: 'badge-attente',
    en_cours:   'badge-cours',
    resolu:     'badge-resolu',
    rejete:     'badge-rejete'
  };
  return `<span class="badge ${map[statut] || ''}">${statut.replace('_', ' ')}</span>`;
}

function afficher(liste) {
  const div = document.getElementById('liste-dashboard');
  if (!liste.length) {
    div.innerHTML = '<div class="card">Aucun signalement trouvé.</div>';
    return;
  }
  div.innerHTML = liste.map(s => `
    <div class="card" style="border-left:4px solid #1a73e8">
      <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:0.5rem">
        <div>
          <h3>${s.titre}</h3>
          <p style="color:#666;margin:0.4rem 0">${s.description}</p>
          <small>
            📍 ${s.localisation?.adresse || 'N/A'} &nbsp;|&nbsp;
            🏷️ ${categories[s.categorie] || s.categorie} &nbsp;|&nbsp;
            🗓️ ${new Date(s.date_creation).toLocaleDateString()} &nbsp;|&nbsp;
            👤 ${s.citoyen_nom || 'Inconnu'} &nbsp;|&nbsp;
            👍 ${s.votes} votes
          </small>
        </div>
        <div style="display:flex;flex-direction:column;gap:0.5rem;align-items:flex-end">
          ${getBadge(s.statut)}
          <button class="btn btn-primary" onclick="ouvrirModal('${s._id}','${s._rev}','${s.statut}')">
            ✏️ Traiter
          </button>
        </div>
      </div>
      ${s.historique && s.historique.length > 1 ? `
        <details style="margin-top:0.8rem">
          <summary style="cursor:pointer;color:#1a73e8">📜 Historique</summary>
          <div style="margin-top:0.5rem">
            ${s.historique.map(h => `
              <div style="padding:0.3rem 0;border-bottom:1px solid #eee;font-size:0.85rem">
                ${getBadge(h.statut)} 
                <span style="color:#666">${new Date(h.date).toLocaleString()}</span>
                ${h.commentaire ? `— ${h.commentaire}` : ''}
              </div>
            `).join('')}
          </div>
        </details>
      ` : ''}
    </div>
  `).join('');
}

function filtrer() {
  const statut    = document.getElementById('filtre-statut').value;
  const categorie = document.getElementById('filtre-categorie').value;
  let liste = tousSignalements;
  if (statut)    liste = liste.filter(s => s.statut === statut);
  if (categorie) liste = liste.filter(s => s.categorie === categorie);
  afficher(liste);
}

function ouvrirModal(id, rev, statut) {
  document.getElementById('modal-id').value       = id;
  document.getElementById('modal-rev').value      = rev;
  document.getElementById('modal-statut').value   = statut;
  document.getElementById('modal-commentaire').value = '';
  document.getElementById('modal').style.display  = 'flex';
}

function fermerModal() {
  document.getElementById('modal').style.display = 'none';
}

async function sauvegarder() {
  const id          = document.getElementById('modal-id').value;
  const statut      = document.getElementById('modal-statut').value;
  const commentaire = document.getElementById('modal-commentaire').value;

  const res = await fetch(`${API}/signalements/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ statut, commentaire })
  });

  const data = await res.json();
  if (data.success) {
    fermerModal();
    charger();
  } else {
    alert('Erreur : ' + data.error);
  }
}

charger();
</script>
</body>
</html>
