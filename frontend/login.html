<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion — Signalement Urbain</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <h1>🏙️ Signalement Urbain</h1>
  <div>
    <a href="index.html">Accueil</a>
  </div>
</nav>

<div class="container" style="max-width:480px">
  <div class="card" style="margin-top:3rem">
    <h2 style="margin-bottom:1.5rem">Connexion</h2>
    <div id="alert"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="votre@email.com">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" onclick="login()" style="width:100%">Se connecter</button>
    <p style="margin-top:1rem;text-align:center">
      Pas de compte ? <a href="register.html">S'inscrire</a>
    </p>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const alertDiv = document.getElementById('alert');

  const res = await fetch(`${API}/users/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, motdepasse: password })
  });

  const data = await res.json();
  if (data.success) {
    setUser(data.user);
    window.location.href = 'index.html';
  } else {
    alertDiv.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
  }
}
</script>
</body>
</html>
